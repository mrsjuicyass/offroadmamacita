<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrsJuicyAss 🍑 Elizabeth Sanchez</title>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animierte Hintergrund-Effekte */
        .background-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 200px;
            height: 200px;
            background: #00ff88;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #ff00ff;
            bottom: -150px;
            right: -150px;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #00aaff;
            top: 50%;
            right: -125px;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        .container {
            text-align: center;
            z-index: 1;
            max-width: 600px;
            padding: 40px;
        }

        /* Glühender Ring-Effekt um den Counter */
        .glow-ring {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .ring {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.3), rgba(255, 0, 255, 0.3), rgba(0, 170, 255, 0.3)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spin 6s linear infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .ring-2 {
            width: 320px;
            height: 320px;
            animation: spin 8s linear infinite reverse;
            opacity: 0.6;
        }

        .ring-3 {
            width: 240px;
            height: 240px;
            animation: spin 4s linear infinite;
            opacity: 0.4;
        }

        @keyframes spin {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Zentral Counter */
        .counter-display {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .counter-number {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow: 0 0 0px rgba(102, 126, 234, 0.3);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 20px rgba(102, 126, 234, 0.6), 0 0 40px rgba(118, 75, 162, 0.4);
                transform: scale(1.02);
            }
        }

        .counter-label {
            font-size: 18px;
            color: #764ba2;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Statistik-Karten */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .stat-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .stat-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .stat-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            counter-increment: stat-counter;
        }

        .stat-label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Counter Animation */
        .counter-animate {
            animation: countUp 2s ease-out;
        }

        @keyframes countUp {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .counter-display {
                padding: 30px 20px;
            }

            .counter-number {
                font-size: 48px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .ring {
                width: 220px;
                height: 220px;
            }

            .ring-2 {
                width: 250px;
                height: 250px;
            }

            .ring-3 {
                width: 190px;
                height: 190px;
            }
        }

        /* Glitter-Effekt */
        .glitter {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="glow-ring">
            <div class="ring"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            
            <div class="counter-display">
                <div class="title">Elizabeth Sanchez</div>
                <div class="counter-number">MrsJuicyAss</div>
                <div class="counter-label">Elizabeth Sanchez • MrsJuicyAss</div><hr>
                <div class="counter-number" id="mainCounter">0</div>
                <div class="counter-label">Online Besucher</div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="todayCounter">0</div>
                        <div class="stat-label">Heute</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="weekCounter">0</div>
                        <div class="stat-label">Diese Woche</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="monthCounter">0</div>
                        <div class="stat-label">Diesen Monat</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalCounter">0</div>
                        <div class="stat-label">Gesamt</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialisiere Counter-Werte von localStorage
        const getStoredValue = (key, defaultValue) => {
            const stored = localStorage.getItem(key);
            return stored ? parseInt(stored) : defaultValue;
        };

        const saveValue = (key, value) => {
            localStorage.setItem(key, value);
        };

        // Initial Counter-Werte
        let mainCounter = getStoredValue('mainCounter', Math.floor(Math.random() * 500) + 100);
        let todayCounter = getStoredValue('todayCounter', Math.floor(Math.random() * 150) + 50);
        let weekCounter = getStoredValue('weekCounter', Math.floor(Math.random() * 1000) + 300);
        let monthCounter = getStoredValue('monthCounter', Math.floor(Math.random() * 5000) + 1000);
        let totalCounter = getStoredValue('totalCounter', Math.floor(Math.random() * 50000) + 10000);

        // Animate Counter
        const animateCounter = (element, start, end, duration = 1500) => {
            let current = start;
            const increment = (end - start) / (duration / 16);
            const timer = setInterval(() => {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    current = end;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current).toLocaleString('de-DE');
            }, 16);
        };

        // Update Counter beim Laden
        window.addEventListener('load', () => {
            animateCounter(document.getElementById('mainCounter'), 0, mainCounter);
            animateCounter(document.getElementById('todayCounter'), 0, todayCounter);
            animateCounter(document.getElementById('weekCounter'), 0, weekCounter);
            animateCounter(document.getElementById('monthCounter'), 0, monthCounter);
            animateCounter(document.getElementById('totalCounter'), 0, totalCounter);
        });

        // Simuliere neue Besucher alle 5-15 Sekunden
        setInterval(() => {
            const randomIncrease = Math.floor(Math.random() * 3) + 1;
            mainCounter += randomIncrease;
            todayCounter += randomIncrease;
            weekCounter += randomIncrease;
            monthCounter += randomIncrease;
            totalCounter += randomIncrease;

            // Speichere Werte
            saveValue('mainCounter', mainCounter);
            saveValue('todayCounter', todayCounter);
            saveValue('weekCounter', weekCounter);
            saveValue('monthCounter', monthCounter);
            saveValue('totalCounter', totalCounter);

            // Update Display
            document.getElementById('mainCounter').textContent = mainCounter.toLocaleString('de-DE');
            document.getElementById('todayCounter').textContent = todayCounter.toLocaleString('de-DE');
            document.getElementById('weekCounter').textContent = weekCounter.toLocaleString('de-DE');
            document.getElementById('monthCounter').textContent = monthCounter.toLocaleString('de-DE');
            document.getElementById('totalCounter').textContent = totalCounter.toLocaleString('de-DE');

            // Animation Effekt
            document.getElementById('mainCounter').style.animation = 'none';
            setTimeout(() => {
                document.getElementById('mainCounter').style.animation = 'pulse-glow 2s ease-in-out infinite';
            }, 10);
        }, Math.random() * 10000 + 5000);

        // Glitter-Effekte generieren
        const createGlitter = () => {
            const glitter = document.createElement('div');
            glitter.className = 'glitter';
            glitter.style.left = Math.random() * window.innerWidth + 'px';
            glitter.style.top = Math.random() * window.innerHeight + 'px';
            glitter.style.animation = `float ${Math.random() * 3 + 2}s ease-in-out forwards`;
            document.body.appendChild(glitter);
            
            setTimeout(() => glitter.remove(), 5000);
        };

        // Erzeuge regelmäßig Glitter
        setInterval(createGlitter, 1500);
    </script>
</body>
</html>
